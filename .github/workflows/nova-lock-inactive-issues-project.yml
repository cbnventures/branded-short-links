# Do not edit manually.
#
# Run `nova generate github workflows` to regenerate.
# See: https://nova.cbnventures.io/docs/cli/generators/github/workflows

name: "Lock Inactive Issues (project)"

run-name: "Locking inactive issues (project)${{ github.event_name == 'workflow_dispatch' && inputs.dry-run && ' (dry run)' || '' }}"

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run without making changes"
        required: false
        type: "boolean"
        default: true

permissions:
  issues: "write"

concurrency:
  group: "${{ github.workflow }}"
  cancel-in-progress: false

env:
  DRY_RUN: "${{ github.event_name == 'workflow_dispatch' && inputs.dry-run || 'false' }}"

jobs:
  lock-inactive-issues:
    runs-on: "ubuntu-latest"
    timeout-minutes: 5
    steps:
      - name: "Lock inactive threads"
        uses: "mrjackyliang/lock-inactive-threads@v1"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          GITHUB_TOKEN: "${{ env.GITHUB_TOKEN }}"
          ISSUE_COMMENT: "Due to inactivity, this issue will be locked and marked as resolved. If you have any further questions or inquiries, please feel free to open a new issue."
          ISSUE_INACTIVE_DAYS: "30"
          ISSUE_LOCK_REASON: "resolved"
          PR_COMMENT: "Due to inactivity, this pull request will be locked and marked as resolved. If you have any further questions or inquiries, please feel free to open a new pull request."
          PR_INACTIVE_DAYS: "30"
          PR_LOCK_REASON: "resolved"
          LOG_OUTPUT: "true"
          DRY_RUN: "${{ env.DRY_RUN }}"
