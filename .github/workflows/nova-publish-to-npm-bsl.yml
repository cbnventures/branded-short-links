name: "Publish to npm (bsl)"

run-name: "Publishing ${{ github.event.release.tag_name || 'manually' }} to npm (bsl)${{ github.event_name == 'workflow_dispatch' && inputs.dry-run && ' (dry run)' || '' }}"

on:
  release:
    types:
      - "published"

  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run without making changes"
        required: false
        type: "boolean"
        default: true

permissions:
  contents: "read"

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

env:
  PUBLISH: "${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry-run) }}"
  ROOT_DIR: "./"
  NPM_DIR: "./packages/branded-short-links"

jobs:
  publish-to-npm:
    runs-on: "ubuntu-latest"
    timeout-minutes: 10
    permissions:
      contents: "read"
      id-token: "write"
    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@v6"

      - name: "Setup Node.js"
        uses: "actions/setup-node@v6"
        with:
          node-version-file: "${{ env.ROOT_DIR }}/package.json"
          package-manager-cache: false
          registry-url: "https://registry.npmjs.org"

      - name: "Remove deprecated .npmrc entries"
        run: |
          npmrc="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"

          if [ -f "$npmrc" ]; then
            sed -i '/^always-auth=/d' "$npmrc"
          fi

      - name: "Install packages"
        run: |
          npm install -g npm@latest
          npm install
        working-directory: "${{ env.ROOT_DIR }}"

      - name: "Check project"
        run: |
          npm run check
        working-directory: "${{ env.ROOT_DIR }}"

      - name: "Build project"
        run: |
          npm run build
        working-directory: "${{ env.ROOT_DIR }}"

      - name: "Configure authentication"
        env:
          NPM_TOKEN: "${{ secrets.NPM_TOKEN }}"
        run: |
          if [ -n "${NPM_TOKEN}" ]; then
            echo "[Auth] Using NPM_TOKEN (token-based)."
            echo "NODE_AUTH_TOKEN=${NPM_TOKEN}" >> "$GITHUB_ENV"
          else
            echo "[Auth] Using trusted publishing (OIDC)."

            npmrc="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"

            if [ -f "$npmrc" ]; then
              sed -i '/^\/\/registry\.npmjs\.org\/:_authToken/d' "$npmrc"
              echo "[Auth] Removed _authToken entry from .npmrc."
            fi
          fi

      - name: "Publish package to npm"
        run: |
          if [ "${PUBLISH}" = "true" ]; then
            echo "[Publish] Production."
            npm publish
          else
            echo "[Publish] Dry run."
            npm publish --dry-run
          fi
        working-directory: "${{ env.NPM_DIR }}"
