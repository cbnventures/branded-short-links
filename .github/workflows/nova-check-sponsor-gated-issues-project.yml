# Do not edit manually.
#
# Run `nova generate github workflows` to regenerate.
# See: https://nova.cbnventures.io/docs/cli/generators/github/workflows

name: "Check Sponsor Gated Issues (project)"

run-name: "${{ github.event_name == 'issues' && format('Analyzing issue #{0}', github.event.issue.number) || format('Analyzing comment on issue #{0}', github.event.issue.number) }}"

on:
  issue_comment:
    types:
      - "created"
      - "edited"
  issues:
    types:
      - "opened"
      - "closed"

permissions:
  contents: "read"

concurrency:
  group: "${{ github.workflow }}-${{ github.event.issue.number }}"
  cancel-in-progress: false

env:
  ISSUE_LABELS: "${{ vars.ISSUE_LABELS }}"
  ISSUE_LIMIT_COMMENTER: "${{ vars.ISSUE_LIMIT_COMMENTER }}"
  ISSUE_LOCK_ON_CLOSE: "${{ vars.ISSUE_LOCK_ON_CLOSE }}"
  ISSUE_MESSAGE_NOT_SPONSOR: "${{ vars.ISSUE_MESSAGE_NOT_SPONSOR }}"
  ISSUE_MESSAGE_WELCOME: "${{ vars.ISSUE_MESSAGE_WELCOME }}"
  IS_ORGANIZATION: "${{ vars.IS_ORGANIZATION }}"
  SPONSOR_ACTIVE_ONLY: "${{ vars.SPONSOR_ACTIVE_ONLY }}"
  SPONSOR_EXEMPT_FILE_LOCATION: "${{ vars.SPONSOR_EXEMPT_FILE_LOCATION }}"
  SPONSOR_MINIMUM: "${{ vars.SPONSOR_MINIMUM }}"

jobs:
  check-issues:
    runs-on: "ubuntu-latest"
    timeout-minutes: 5
    permissions:
      contents: "read"
      issues: "write"
    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@v6"

      - name: "Check support issues"
        uses: "mrjackyliang/sponsor-gated-support@v1.0.1"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          PERSONAL_ACCESS_TOKEN: "${{ secrets.PERSONAL_ACCESS_TOKEN }}"
        with:
          GITHUB_PERSONAL_ACCESS_TOKEN: "${{ env.PERSONAL_ACCESS_TOKEN }}"
          GITHUB_WORKFLOW_TOKEN: "${{ env.GITHUB_TOKEN }}"
          ISSUE_LABELS: "${{ env.ISSUE_LABELS }}"
          ISSUE_LIMIT_COMMENTER: "${{ env.ISSUE_LIMIT_COMMENTER }}"
          ISSUE_LOCK_ON_CLOSE: "${{ env.ISSUE_LOCK_ON_CLOSE }}"
          ISSUE_MESSAGE_NOT_SPONSOR: "${{ env.ISSUE_MESSAGE_NOT_SPONSOR }}"
          ISSUE_MESSAGE_WELCOME: "${{ env.ISSUE_MESSAGE_WELCOME }}"
          IS_ORGANIZATION: "${{ env.IS_ORGANIZATION }}"
          SPONSOR_ACTIVE_ONLY: "${{ env.SPONSOR_ACTIVE_ONLY }}"
          SPONSOR_EXEMPT_FILE_LOCATION: "${{ env.SPONSOR_EXEMPT_FILE_LOCATION }}"
          SPONSOR_MINIMUM: "${{ env.SPONSOR_MINIMUM }}"
