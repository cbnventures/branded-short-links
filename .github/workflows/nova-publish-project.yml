name: "Publish (project)"

run-name: "Publishing ${{ github.event.release.tag_name || 'manually' }} (project)${{ github.event_name == 'workflow_dispatch' && inputs.dry-run && ' (dry run)' || '' }}"

on:
  release:
    types:
      - "published"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run without making changes"
        required: false
        type: "boolean"
        default: true

permissions:
  contents: "read"

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

env:
  PUBLISH: "${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry-run) }}"
  ROOT_DIR: "./"

jobs:
  build:
    runs-on: "ubuntu-latest"
    timeout-minutes: 15
    permissions:
      contents: "read"
    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@v6"

      - name: "Setup Node.js"
        uses: "actions/setup-node@v6"
        with:
          node-version-file: "${{ env.ROOT_DIR }}/package.json"
          package-manager-cache: false

      - name: "Install packages"
        run: |
          npm install -g npm@latest
          npm install
        working-directory: "${{ env.ROOT_DIR }}"

      - name: "Check project"
        run: |
          npx turbo run check --filter=branded-short-links --filter=branded-short-links-docs --concurrency=2
        working-directory: "${{ env.ROOT_DIR }}"

      - name: "Build project"
        run: |
          npx turbo run build --filter=branded-short-links --filter=branded-short-links-docs --concurrency=2
        working-directory: "${{ env.ROOT_DIR }}"

      - name: "Upload build artifacts (npm/packages-branded-short-links)"
        uses: "actions/upload-artifact@v4"
        with:
          name: "build-npm-packages-branded-short-links"
          retention-days: 1
          path: |
            packages/branded-short-links/build

      - name: "Upload build artifacts (github-packages/packages-branded-short-links)"
        uses: "actions/upload-artifact@v4"
        with:
          name: "build-github-packages-packages-branded-short-links"
          retention-days: 1
          path: |
            packages/branded-short-links/build

      - name: "Upload build artifacts (cloudflare-pages-docusaurus/apps-docs)"
        uses: "actions/upload-artifact@v4"
        with:
          name: "build-cloudflare-pages-docusaurus-apps-docs"
          retention-days: 1
          path: |
            apps/docs/build

  publish-npm-packages-branded-short-links:
    needs: "build"
    runs-on: "ubuntu-latest"
    timeout-minutes: 10
    permissions:
      contents: "read"
      id-token: "write"
    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@v6"

      - name: "Setup Node.js"
        uses: "actions/setup-node@v6"
        with:
          node-version-file: "${{ env.ROOT_DIR }}/package.json"
          package-manager-cache: false
          registry-url: "https://registry.npmjs.org"

      - name: "Remove deprecated .npmrc entries"
        run: |
          npmrc="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"

          if [ -f "$npmrc" ]; then
            sed -i '/^always-auth=/d' "$npmrc"
          fi

      - name: "Download build artifacts"
        uses: "actions/download-artifact@v4"
        with:
          name: "build-npm-packages-branded-short-links"
          path: "./packages/branded-short-links/build"

      - name: "Configure authentication"
        env:
          NPM_TOKEN: "${{ secrets.NPM_TOKEN }}"
        run: |
          if [ -n "${NPM_TOKEN}" ]; then
            echo "[Auth] Using NPM_TOKEN (token-based)."
            echo "NODE_AUTH_TOKEN=${NPM_TOKEN}" >> "$GITHUB_ENV"
          else
            echo "[Auth] Using trusted publishing (OIDC)."

            npmrc="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"

            if [ -f "$npmrc" ]; then
              sed -i '/^\/\/registry\.npmjs\.org\/:_authToken/d' "$npmrc"
              echo "[Auth] Removed _authToken entry from .npmrc."
            fi
          fi

      - name: "Publish package to npm"
        run: |
          if [ "${PUBLISH}" = "true" ]; then
            echo "[Publish] Production."
            npm publish --provenance --access public
          else
            echo "[Publish] Dry run."
            npm publish --dry-run
          fi
        working-directory: "./packages/branded-short-links"

  publish-github-packages-packages-branded-short-links:
    needs: "build"
    runs-on: "ubuntu-latest"
    timeout-minutes: 10
    permissions:
      contents: "read"
      packages: "write"
      id-token: "write"
    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@v6"

      - name: "Setup Node.js"
        uses: "actions/setup-node@v6"
        with:
          node-version-file: "${{ env.ROOT_DIR }}/package.json"
          package-manager-cache: false

      - name: "Configure registry for GitHub Packages"
        uses: "actions/setup-node@v6"
        with:
          node-version-file: "${{ env.ROOT_DIR }}/package.json"
          package-manager-cache: false
          registry-url: "https://npm.pkg.github.com"
          scope: "@${{ github.repository_owner }}"

      - name: "Remove deprecated .npmrc entries"
        run: |
          npmrc="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"

          if [ -f "$npmrc" ]; then
            sed -i '/^always-auth=/d' "$npmrc"
          fi

      - name: "Download build artifacts"
        uses: "actions/download-artifact@v4"
        with:
          name: "build-github-packages-packages-branded-short-links"
          path: "./packages/branded-short-links/build"

      - name: "Change to scoped package name"
        run: |
          REPOSITORY_OWNER="@$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          PACKAGE_NAME=$(npm pkg get name --workspaces=false | jq -r '.')

          echo "[Scope] Owner is \"${REPOSITORY_OWNER}\" and package is \"${PACKAGE_NAME}\"."

          echo "PACKAGE_NAME=$PACKAGE_NAME" >> "$GITHUB_ENV"

          if [[ "$PACKAGE_NAME" != "$REPOSITORY_OWNER/"* ]]; then
            BASE=${PACKAGE_NAME##*/}
            NEW_NAME="$REPOSITORY_OWNER/$BASE"

            echo "[Scope] Scoping package name to \"${NEW_NAME}\"."

            npm pkg set name="$NEW_NAME"
          else
            echo "[Scope] Already scoped. No changes needed."
          fi
        working-directory: "./packages/branded-short-links"

      - name: "Configure authentication"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          echo "[Auth] Using GITHUB_TOKEN."
          echo "NODE_AUTH_TOKEN=${GITHUB_TOKEN}" >> "$GITHUB_ENV"

      - name: "Publish package to GitHub Packages"
        run: |
          if [ "${PUBLISH}" = "true" ]; then
            echo "[Publish] Production."
            npm publish
          else
            echo "[Publish] Dry run."
            npm publish --dry-run
          fi
        working-directory: "./packages/branded-short-links"

      - name: "Restore package name"
        if: "${{ always() && env.PACKAGE_NAME }}"
        run: |
          npm pkg set name="$PACKAGE_NAME"
        working-directory: "./packages/branded-short-links"

  publish-cloudflare-pages-docusaurus-apps-docs:
    needs: "build"
    runs-on: "ubuntu-latest"
    timeout-minutes: 10
    permissions:
      contents: "read"
    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@v6"

      - name: "Download build artifacts"
        uses: "actions/download-artifact@v4"
        with:
          name: "build-cloudflare-pages-docusaurus-apps-docs"
          path: "./apps/docs/build"

      - name: "Deploy to Cloudflare Pages"
        if: "${{ env.PUBLISH == 'true' }}"
        uses: "cloudflare/wrangler-action@v3"
        env:
          CLOUDFLARE_API_TOKEN: "${{ secrets.CLOUDFLARE_API_TOKEN }}"
        with:
          apiToken: "${{ env.CLOUDFLARE_API_TOKEN }}"
          accountId: "${{ vars.CLOUDFLARE_ACCOUNT_ID }}"
          command: "pages deploy ./apps/docs/build --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME }} --branch=${{ github.event.repository.default_branch }}"
